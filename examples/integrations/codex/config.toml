# Replace the paths before copying this into an active Codex config layer.
[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
command = "python3 /absolute/path/to/starexplorer/integrations/codex_hooks.py capture"
command_windows = 'py -3 C:\absolute\path\to\starexplorer\integrations\codex_hooks.py capture'
timeout = 5
statusMessage = "Recording analysis telemetry"

[[hooks.PostToolUse]]
matcher = "*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "python3 /absolute/path/to/starexplorer/integrations/codex_hooks.py capture"
command_windows = 'py -3 C:\absolute\path\to\starexplorer\integrations\codex_hooks.py capture'
timeout = 5
