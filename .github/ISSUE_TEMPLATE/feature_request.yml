name: Feature request
description: Propose a focused Evolastra capability.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or analytical problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome.
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Primary layer
      options:
        - Operational telemetry
        - Semantic graph
        - Visualization
        - Integration or SDK
        - Deployment or security
        - Documentation
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Privacy and compatibility considerations
      description: Note effects on local-first storage, redaction, replay, schemas, or exports.
