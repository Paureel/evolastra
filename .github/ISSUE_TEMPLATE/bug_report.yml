name: Bug report
description: Report a reproducible defect without including private data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, pairing codes, private analytical data, or unredacted artifacts.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest deterministic sequence of steps.
      placeholder: "1. Start ...\n2. Select ...\n3. Observe ..."
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Galaxy or System map
        - Advanced views
        - Local companion or pairing
        - Event ingestion or projection
        - Replay or export
        - SDK or integration
        - Documentation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows version, Python, Node.js, browser"
  - type: textarea
    id: evidence
    attributes:
      label: Redacted logs or screenshots
      description: Attach only material that is safe to store in the repository.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, tokens, pairing codes, and private analytical content.
          required: true
